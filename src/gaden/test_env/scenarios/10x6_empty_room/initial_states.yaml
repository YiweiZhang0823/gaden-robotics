# Initial-state presets for the three open-field thesis scenarios.
#
# Coordinates are in the GADEN/RViz `map` frame, meters and radians.
# The gas source is shared by the three scenarios:
#   source = [1.0, 4.95, 0.7]
#
# For each state:
# - `ee_target` is the desired initial TCP / gas-sensor position.
# - `base_pose` places the Franka base close enough that the target is reachable.
# - Launch with `align_base_from_gas_yaml:=false`, then publish `ee_target`
#   with `ros2 run test_env publish_ee_goal ... --frame map --preset tilt_x_90`.
#
# State categories follow the supervisor's requested coverage:
# - far_off_plume: far from source, away from plume edge
# - far_near_edge: far from source, close to plume boundary
# - far_inside_plume: far from source, inside plume body
# - near_source_outside_plume: close to source, outside plume
# - near_source_upwind: close to source, on the upwind side

source: [1.0, 4.95, 0.7]
default_ee_preset: tilt_x_90

scenarios:
  exp1_diffusion:
    launch: gaden_franka_open_exp1.launch.py
    configuration: config_exp1_open_weak
    plume_summary: >
      Diffusion-dominated, weak/no mean airflow. The plume stays broad around
      the source. For the fixed-base Franka experiment, all initial states are
      chosen near the source and within the arm workspace; "far" means farther
      within this local workspace, not room-scale distance.
    fixed_base_pose: [0.8, 4.65, 0.0]
    states:
      far_off_plume:
        label: "远离气源，且离羽流边缘也有一段距离"
        source_relation: far
        plume_relation: outside_far_from_edge
        wind_relation: weak_wind_reference_crosswind
        expected_gas_cue: none_or_very_weak
        ee_target: [1.25, 4.1, 0.65]
        base_pose: [0.8, 4.65, 0.0]
      far_near_edge:
        label: "远离气源，但接近羽流边缘"
        source_relation: far
        plume_relation: edge
        wind_relation: weak_wind_reference_downwind
        expected_gas_cue: weak_or_intermittent
        ee_target: [1.35, 4.35, 0.65]
        base_pose: [0.8, 4.65, 0.0]
      far_inside_plume:
        label: "远离气源，但已经在羽流内部"
        source_relation: far
        plume_relation: inside
        wind_relation: weak_wind_reference_downwind
        expected_gas_cue: clear_plume_contact
        ee_target: [1.35, 4.95, 0.65]
        base_pose: [0.8, 4.65, 0.0]
      near_source_outside_plume:
        label: "靠近气源，但完全在羽流外"
        source_relation: near
        plume_relation: outside_lateral
        wind_relation: weak_wind_reference_crosswind
        expected_gas_cue: none_or_very_weak
        ee_target: [1.0, 4.25, 0.65]
        base_pose: [0.8, 4.65, 0.0]
      near_source_upwind:
        label: "靠近气源，且位于气源上游一侧"
        source_relation: near
        plume_relation: outside_upwind_reference
        wind_relation: weak_wind_reference_upwind
        expected_gas_cue: weak_or_clear_because_diffusion
        ee_target: [0.75, 4.95, 0.65]
        base_pose: [0.8, 4.65, 0.0]

  exp2_time_varying:
    launch: gaden_franka_open_exp2.launch.py
    configuration: config_exp2_open_timevarying
    plume_summary: >
      Time-varying airflow with net downwind direction roughly +x. The plume is
      intermittent and can bend. For the fixed-base Franka experiment, all
      initial states are local arm-workspace offsets near the same source.
    fixed_base_pose: [0.8, 4.65, 0.0]
    states:
      far_off_plume:
        label: "远离气源，且离羽流边缘也有一段距离"
        source_relation: far
        plume_relation: outside_far_from_edge
        wind_relation: downwind_crosswind
        expected_gas_cue: none_or_very_weak
        ee_target: [1.3, 4.05, 0.65]
        base_pose: [0.8, 4.65, 0.0]
      far_near_edge:
        label: "远离气源，但接近羽流边缘"
        source_relation: far
        plume_relation: edge
        wind_relation: downwind
        expected_gas_cue: weak_or_intermittent
        ee_target: [1.45, 4.25, 0.65]
        base_pose: [0.8, 4.65, 0.0]
      far_inside_plume:
        label: "远离气源，但已经在羽流内部"
        source_relation: far
        plume_relation: inside
        wind_relation: downwind
        expected_gas_cue: clear_plume_contact
        ee_target: [1.45, 5.0, 0.65]
        base_pose: [0.8, 4.65, 0.0]
      near_source_outside_plume:
        label: "靠近气源，但完全在羽流外"
        source_relation: near
        plume_relation: outside_lateral
        wind_relation: crosswind
        expected_gas_cue: none_or_very_weak
        ee_target: [1.0, 4.25, 0.65]
        base_pose: [0.8, 4.65, 0.0]
      near_source_upwind:
        label: "靠近气源，且位于气源上游一侧"
        source_relation: near
        plume_relation: outside_upwind
        wind_relation: upwind
        expected_gas_cue: none_or_very_weak
        ee_target: [0.75, 4.95, 0.65]
        base_pose: [0.8, 4.65, 0.0]

  exp3_advection:
    launch: gaden_franka_open_exp3.launch.py
    configuration: config_exp3_open_steady
    plume_summary: >
      Advection-dominated steady wind, approximately +x with a small +z
      component. The visible plume is a narrow downwind corridor from the source
      toward the right side of the room. Because this is a fixed-base Franka
      experiment, the "far" states are arm-workspace-scale offsets, not
      room-scale mobile-robot starts.
    fixed_base_pose: [0.8, 4.65, 0.0]
    states:
      far_off_plume:
        label: "远离气源，且离羽流边缘也有一段距离"
        source_relation: far
        plume_relation: outside_far_from_edge
        wind_relation: downwind_crosswind
        expected_gas_cue: none_or_very_weak
        ee_target: [1.35, 4.2, 0.65]
        base_pose: [0.8, 4.65, 0.0]
      far_near_edge:
        label: "远离气源，但接近羽流边缘"
        source_relation: far
        plume_relation: edge
        wind_relation: downwind
        expected_gas_cue: weak_or_intermittent
        ee_target: [1.55, 4.55, 0.65]
        base_pose: [0.8, 4.65, 0.0]
      far_inside_plume:
        label: "远离气源，但已经在羽流内部"
        source_relation: far
        plume_relation: inside
        wind_relation: downwind
        expected_gas_cue: clear_plume_contact
        ee_target: [1.55, 4.95, 0.65]
        base_pose: [0.8, 4.65, 0.0]
      near_source_outside_plume:
        label: "靠近气源，但完全在羽流外"
        source_relation: near
        plume_relation: outside_lateral
        wind_relation: crosswind
        expected_gas_cue: none_or_very_weak
        ee_target: [1.0, 4.35, 0.65]
        base_pose: [0.8, 4.65, 0.0]
      near_source_upwind:
        label: "靠近气源，且位于气源上游一侧"
        source_relation: near
        plume_relation: outside_upwind
        wind_relation: upwind
        expected_gas_cue: none_or_very_weak
        ee_target: [0.75, 4.95, 0.65]
        base_pose: [0.8, 4.65, 0.0]
